<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSCA Wiki Editor (GitHub)</title>
<link rel="stylesheet" href="/static/editor.css">
<link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
</head>
<body>

<!-- 顶部工具栏 -->
<header id="toolbar">
  <span class="brand">SSCA Wiki Editor <span class="badge">GitHub</span></span>
  <span id="current-path" data-i18n="no_file">未选择文件</span>
  <div class="spacer"></div>
  <select id="lang-select" style="font-size:12px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:2px 4px;margin-right:6px;cursor:pointer;" onchange="i18n.setLang(this.value)">
    <option value="zh_CN">中文</option>
    <option value="en_US">English</option>
  </select>
  <span id="status-dot" class="status-dot" data-i18n-title="status_checking" title="检查连接中…"></span>
  <button id="btn-save" disabled data-i18n-title="btn_save_title" data-i18n="btn_save" title="保存到 GitHub">&#128190; 保存</button>
  <button id="btn-undo" class="btn-secondary" disabled data-i18n-title="btn_undo_title" data-i18n="btn_undo" title="撤回上一次编辑操作">&#8617; 撤回</button>
  <button id="btn-new" class="btn-secondary" data-i18n-title="btn_new_title" data-i18n="btn_new" title="新建页面">&#128196; 新建</button>
  <button id="btn-delete" class="btn-danger" disabled data-i18n-title="btn_delete_title" data-i18n="btn_delete" title="删除当前页面">&#128465; 删除</button>
  <span id="session-timer" data-i18n-title="session_timer_title" title="空闲超时倒计时，操作后自动刷新；关闭浏览器再回来需重新登录" style="font-size:12px;color:#8b949e;margin-right:8px;cursor:help;"></span>
  <button id="btn-logout" class="btn-secondary" data-i18n-title="btn_logout_title" data-i18n="btn_logout" title="退出登录">退出</button>
</header>

<!-- 主体 -->
<div id="main">
  <!-- 侧栏 -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h3 data-i18n="sidebar_title">Wiki 导航</h3>
      <button id="btn-refresh" data-i18n-title="btn_refresh_title" title="刷新导航">&#128260;</button>
    </div>
    <div id="nav-tree">
      <div class="loading" data-i18n="loading">加载中…</div>
    </div>
  </aside>

  <!-- 编辑区域 -->
  <div id="editor-area">
    <div id="editor-placeholder">
      <div class="placeholder-content">
        <div class="placeholder-icon">&#128221;</div>
        <h2 data-i18n="placeholder_title">SSCA Wiki 远程编辑器</h2>
        <p data-i18n="placeholder_desc">点击左侧导航选择要编辑的页面</p>
        <p class="placeholder-sub" data-i18n="placeholder_sub">所有修改将直接提交到 GitHub 仓库</p>
      </div>
    </div>
    <div id="editor-container"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- 新建页面弹窗 -->
<div id="create-dialog" class="dialog-overlay">
  <div class="dialog-box">
    <h3 data-i18n="create_dialog_title">新建 Wiki 页面</h3>
    <label for="create-title" data-i18n="create_title_label">页面标题</label>
    <input id="create-title" data-i18n-placeholder="create_title_placeholder" placeholder="例如: 新物品介绍">
    <label for="create-dir" data-i18n="create_dir_label">文件目录</label>
    <select id="create-dir"><option value="" data-i18n="create_dir_root">docs/（根目录）</option></select>
    <label for="create-filename" data-i18n="create_filename_label">文件名</label>
    <input id="create-filename" data-i18n-placeholder="create_filename_placeholder" placeholder="例如: new_item.md">
    <label for="create-section" data-i18n="create_section_label">归入导航分区（可选）</label>
    <select id="create-section"><option value="" data-i18n="create_section_none">-- 不添加到导航 --</option></select>
    <div class="dialog-actions">
      <button class="btn-cancel" id="create-cancel" data-i18n="btn_cancel">取消</button>
      <button class="btn-primary" id="create-confirm" data-i18n="btn_create">创建</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div id="delete-dialog" class="dialog-overlay">
  <div class="dialog-box">
    <h3 style="color:#f85149" data-i18n="delete_dialog_title">确认删除</h3>
    <p id="del-msg"></p>
    <p style="color:#f85149;font-size:13px;margin-top:8px" data-i18n="delete_dialog_warn">此操作将直接删除 GitHub 上的文件，不可撤销。</p>
    <div class="dialog-actions">
      <button class="btn-cancel" id="del-cancel" data-i18n="btn_cancel">取消</button>
      <button class="btn-danger" id="del-confirm" data-i18n="btn_delete_confirm">确认删除</button>
    </div>
  </div>
</div>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="/static/i18n.js"></script>
<script>i18n.load(function(){ var s=document.createElement('script');s.src='/static/editor.js';document.body.appendChild(s); });</script>
</body>
</html>
